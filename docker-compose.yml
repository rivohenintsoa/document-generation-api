version: "3.9"

services:
  api:
    build: .
    container_name: document-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    volumes:
      - .:/app
    command: npm run dev

  worker:
    build: .
    container_name: document-worker
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    volumes:
      - .:/app
    command: npm run worker

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6380:6379"

volumes:
  mongo_data: